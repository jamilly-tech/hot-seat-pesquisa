<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Seat — Painel Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;}
body{margin:0;padding:0;background:#0A0A0A;font-family:'Montserrat',Arial,sans-serif;color:#fff;
background-image:radial-gradient(circle at 50% 0%, rgba(229,9,20,0.18), transparent 55%),radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1.5px);
background-size:100% 480px,22px 22px;background-repeat:no-repeat,repeat;min-height:100vh;}
.wrap{max-width:600px;margin:0 auto;padding:40px 24px 60px;}
.tag{display:block;width:max-content;margin:0 auto;background:#1A1A1A;border:1px solid #E50914;border-radius:20px;padding:6px 16px;box-shadow:0 0 20px 2px rgba(229,9,20,0.25);font-size:11px;font-weight:800;letter-spacing:3px;color:#E50914;text-transform:uppercase;}
h1{font-size:26px;font-weight:800;line-height:1.25;color:#fff;margin:18px 0 0;text-align:center;}
h1 span{color:#E50914;}
.sub{font-size:14px;line-height:1.6;color:#8C8C8C;margin-top:8px;text-align:center;}
.card{background:#141414;border:1px solid #262626;border-radius:16px;padding:22px;margin-top:26px;}
input[type=password]{width:100%;background:#0f0f0f;border:1px solid #3A3A3A;border-radius:12px;padding:14px 16px;color:#fff;font-family:inherit;font-size:15px;}
.btn{width:100%;margin-top:14px;padding:14px;border-radius:12px;border:none;background:#E50914;color:#fff;font-family:inherit;font-size:15px;font-weight:800;letter-spacing:.5px;cursor:pointer;text-transform:uppercase;box-shadow:0 0 20px rgba(229,9,20,0.3);}
.btn:hover{background:#c40810;}
.btn.secondary{background:#2B2B2B;color:#fff;box-shadow:none;}
.btn.secondary:hover{background:#3a3a3a;}
.btn.danger{background:#7a0d12;}
.btn.danger:hover{background:#920f16;}
.err{color:#E50914;font-size:13px;margin-top:10px;text-align:center;display:none;}
.avg{font-size:44px;font-weight:800;color:#E50914;text-align:center;margin:6px 0;}
.section-title{font-size:18px;font-weight:800;text-align:center;margin:0 0 4px;}
.bar-row{margin-bottom:14px;}
.bar-label{display:flex;justify-content:space-between;font-size:13px;color:#B3B3B3;margin-bottom:5px;}
.bar-label b{color:#fff;}
.bar-track{background:#1c1c1c;border-radius:8px;height:10px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,#E50914,#ff4d4d);border-radius:8px;width:0%;transition:width 1s ease;}
.dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:blink 1.5s ease-in-out infinite;}
.dot.closed{background:#888;animation:none;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.status-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#B3B3B3;}
.hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
<div class="tag">Hot Seat com Sócio</div>
<h1>Painel <span>Admin</span></h1>
<p class="sub">Acompanhe os resultados e finalize a votação quando quiser.</p>

<div id="gate" class="card">
<div class="section-title">Entrar</div>
<input type="password" id="pwdInput" placeholder="Senha de admin" style="margin-top:14px;">
<button class="btn" id="loginBtn" style="margin-top:14px;">Entrar</button>
<div class="err" id="loginErr">Senha incorreta.</div>
</div>

<div id="dash" class="hidden">
<div class="card" style="text-align:center;">
<div class="status-row"><span class="dot" id="statusDot"></span><span id="statusText">votação aberta</span></div>
</div>

<div class="card">
<div class="section-title">Nota média</div>
<div class="avg" id="avgNota">–</div>
<div class="sub" style="margin-top:-6px;" id="totalVotosNota">0 votos</div>
<div style="margin-top:18px;" id="notaBars"></div>
</div>

<div class="card">
<div class="section-title">Próximo encontro</div>
<div class="sub" style="margin-top:2px;" id="totalVotosNome">0 votos</div>
<div style="margin-top:18px;" id="nomeBars"></div>
</div>

<div class="card">
<button class="btn" id="finalizeBtn">Finalizar votação</button>
<button class="btn secondary hidden" id="reopenBtn">Reabrir votação</button>
<button class="btn danger" id="resetBtn" style="margin-top:10px;">Zerar tudo (nova edição)</button>
</div>
</div>
</div>

<script>
let pwd = sessionStorage.getItem('hotseat_admin_pwd') || '';
const gate = document.getElementById('gate');
const dash = document.getElementById('dash');
const loginErr = document.getElementById('loginErr');
let poller = null;

async function fetchResults(){
const resp = await fetch('/api/results', {
method: 'POST',
headers: {'Content-Type':'application/json'},
body: JSON.stringify({ password: pwd })
});
return resp;
}

async function tryLoad(){
try {
const resp = await fetchResults();
if (resp.status === 401) return false;
const data = await resp.json();
render(data);
return true;
} catch(e) { return false; }
}

async function loadResults(){
try {
const resp = await fetchResults();
if (!resp.ok) return;
const data = await resp.json();
render(data);
} catch(e) {}
}

function render(data){
const ratings = data.ratings || {};
const names = data.names || {};
const finalized = !!data.finalized;

document.getElementById('statusDot').classList.toggle('closed', finalized);
document.getElementById('statusText').textContent = finalized ? 'votação encerrada' : 'votação aberta — ao vivo';
document.getElementById('finalizeBtn').classList.toggle('hidden', finalized);
document.getElementById('reopenBtn').classList.toggle('hidden', !finalized);

let totalNota = 0, somaNota = 0;
for (let n = 0; n <= 10; n++){
const c = parseInt(ratings[n] || 0, 10);
totalNota += c;
somaNota += c * n;
}
document.getElementById('totalVotosNota').textContent = totalNota + (totalNota===1 ? ' voto' : ' votos');
document.getElementById('avgNota').textContent = totalNota ? (somaNota/totalNota).toFixed(1) : '–';

const notaBars = document.getElementById('notaBars');
notaBars.innerHTML = '';
for (let n = 10; n >= 0; n--){
const c = parseInt(ratings[n] || 0, 10);
  if (c === 0) continue;
const pct = totalNota ? Math.round((c/totalNota)*100) : 0;
notaBars.innerHTML += barRow('Nota ' + n, c, pct);
}

const totalNome = Object.values(names).reduce((a,b)=>a+parseInt(b||0,10),0);
document.getElementById('totalVotosNome').textContent = totalNome + (totalNome===1 ? ' voto' : ' votos');
const nomeBars = document.getElementById('nomeBars');
const sortedNames = Object.entries(names).sort((a,b)=>parseInt(b[1])-parseInt(a[1]));
nomeBars.innerHTML = '';
sortedNames.forEach(([name, count]) => {
const c = parseInt(count || 0, 10);
const pct = totalNome ? Math.round((c/totalNome)*100) : 0;
nomeBars.innerHTML += barRow(name, c, pct);
});
if (sortedNames.length === 0){
nomeBars.innerHTML = '<div class="sub">Ainda sem votos.</div>';
}
}

function barRow(label, count, pct){
return '<div class="bar-row"><div class="bar-label"><span>' + label + '</span><b>' + count + ' (' + pct + '%)</b></div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div></div>';
}

document.getElementById('loginBtn').onclick = async () => {
pwd = document.getElementById('pwdInput').value;
const ok = await tryLoad();
if (ok) {
sessionStorage.setItem('hotseat_admin_pwd', pwd);
gate.classList.add('hidden');
dash.classList.remove('hidden');
loginErr.style.display = 'none';
poller = setInterval(loadResults, 6000);
} else {
loginErr.style.display = 'block';
}
};

document.getElementById('finalizeBtn').onclick = async () => {
if (!confirm('Finalizar a votação? Ninguém mais vai conseguir votar.')) return;
await fetch('/api/finalize', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pwd, action: 'finalize' }) });
loadResults();
};

document.getElementById('reopenBtn').onclick = async () => {
if (!confirm('Reabrir a votação?')) return;
await fetch('/api/finalize', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pwd, action: 'reopen' }) });
loadResults();
};

document.getElementById('resetBtn').onclick = async () => {
if (!confirm('Isso vai apagar TODOS os votos atuais para começar uma nova edição. Tem certeza?')) return;
await fetch('/api/finalize', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pwd, action: 'reset' }) });
loadResults();
};

if (pwd) {
tryLoad().then(ok => {
if (ok) {
gate.classList.add('hidden');
dash.classList.remove('hidden');
poller = setInterval(loadResults, 6000);
}
});
}
</script>
</body>
</html>
